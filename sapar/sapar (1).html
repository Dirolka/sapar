const ItineraryScreen = ({ items, onItemsChange, offlineMode, onOfflineModeChange, onRemoveItem }) => {
  const moveItem = (index, dir) => {
    const newItems = [...items];
    const target = index + dir;
    if (target < 0 || target >= newItems.length) return;
    [newItems[index], newItems[target]] = [newItems[target], newItems[index]];
    onItemsChange(newItems);
  };

  const iconMap = { food: "🍽️", nature: "🏔️", stay: "🏕️", added: "📍" };

  return (
    <div className="flex flex-col h-full bg-white">
      <div className="px-5 pt-5 pb-4" style={{ background: `linear-gradient(135deg, ${TEAL} 0%, ${TEAL_DARK} 100%)` }}>

          <div className="flex items-center justify-between">
            <div>
              <p className="text-xs tracking-wider uppercase" style={{ color: "#80e0eb", letterSpacing: "0.12em" }}>Ваш маршрут</p>
              <h1 className="text-white text-lg font-bold mt-1" style={{ fontFamily: "Georgia, serif" }}>Алматинская область</h1>
            </div>
            <div className="px-3 py-1 rounded-full text-xs font-medium" style={{ background: "rgba(255,255,255,0.18)", color: "#fff" }}>1 день</div>
          </div>
          <div className="flex items-center justify-between mt-4 px-3 py-2 rounded-xl" style={{ background: "rgba(255,255,255,0.12)" }}>
            <div className="flex items-center gap-2">
              {offlineMode ? <WifiOff size={15} color="rgba(255,255,255,0.8)" /> : <Wifi size={15} color="rgba(255,255,255,0.8)" />}
              <span className="text-xs font-medium" style={{ color: "rgba(255,255,255,0.9)" }}>Доступно офлайн</span>

            <button

              style={{ background: offlineMode ? GOLD : "rgba(255,255,255,0.25)", padding: 2, width: 40, height: 22 }}

              <div className="rounded-full bg-white shadow transition-transform duration-300" style={{ width: 18, height: 18, transform: offlineMode ? "translateX(18px)" : "translateX(0)" }} />

          </div>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-5 pt-4 pb-4">
        {items.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-12">
            <Map size={48} color="#e5e7eb" style={{ marginBottom: 12 }} />

            <p className="text-xs text-center text-gray-400">Добавляйте места с главного экрана</p>
          </div>
        ) : (
          <div className="relative">
            {items.map((item, i) => (
              <div key={item.id} className="flex gap-3 mb-1" style={{ animation: `fadeSlideIn 0.3s ease ${i * 0.06}s both` }}>
                <div className="flex flex-col items-center" style={{ width: 44 }}>
                  <span className="font-bold" style={{ fontSize: 11, color: TEAL }}>{item.time}</span>
                  <div className="rounded-full mt-2" style={{ width: 10, height: 10, border: `2px solid ${TEAL}`, background: i === 0 ? TEAL : "#fff" }} />
                  {i < items.length - 1 && <div className="flex-1 mt-1" style={{ width: 2, background: `${TEAL}25` }} />}
                </div>
                <div className="flex-1 p-3 rounded-xl mb-2 flex items-center gap-3" style={{ background: "#f8fafc", border: "1px solid #f1f5f9" }}>
                  <span className="text-xl">{iconMap[item.icon] || "📍"}</span>
                  <div className="flex-1 min-w-0">

                  </div>
                  <div className="flex flex-col gap-1">
                    <button
                      onClick={() => moveItem(i, -1)}
                      className="rounded flex items-center justify-center"
                      style={{ width: 24, height: 24, background: i > 0 ? `${TEAL}10` : "transparent" }}
                      aria-label="Переместить вверх"

                    <button
                      onClick={() => onRemoveItem(item.id)}
                      className="rounded flex items-center justify-center"

                <p style={{ fontSize: 10, color: "#9ca3af" }} className="mt-1">{s.label}</p>
              </div>
            ))}
          </div>
        </div>
        <div style={{ height: 16 }} />
      </div>
    </div>
  );
};

          <div className="flex items-center gap-2 mb-3">
            <Languages size={16} color={TEAL} />
            <span className={`text-xs font-bold ${darkMode ? "dm-text" : "text-gray-700"}`}>Язык интерфейса</span>
          </div>
          <div className="flex gap-2">
            {["ҚАЗ", "РУС", "ENG"].map((l) => (
              <button key={l} onClick={() => update("lang", l)} className="flex-1 py-2 rounded-xl text-xs font-bold transition-all" style={{ background: lang === l ? TEAL : (darkMode ? "#475569" : "#f1f5f9"), color: lang === l ? "#fff" : (darkMode ? "#e2e8f0" : "#64748b"), boxShadow: lang === l ? `0 2px 8px ${TEAL}30` : "none" }}>
                {l}
              </button>
            ))}
          </div>
        </div>

        <div className={`rounded-2xl p-4 mb-3 ${darkMode ? "dm-card" : "bg-white"}`} style={{ boxShadow: "0 2px 16px rgba(0,0,0,0.06)" }}>
          <div className="flex items-center gap-2 mb-3">
            <Lock size={16} color={TEAL} />
            <span className={`text-xs font-bold ${darkMode ? "dm-text" : "text-gray-700"}`}>Приватность и данные</span>
          </div>
          {[
            { label: "Геолокация", desc: "Для поиска мест рядом", key: "geoEnabled" },
            { label: "Аналитика", desc: "Помогает улучшать приложение", key: "analyticsEnabled" },
          ].map((item, i) => (
            <div key={i} className="flex items-center justify-between py-2" style={{ borderBottom: i < 1 ? `1px solid ${darkMode ? "#475569" : "#f1f5f9"}` : "none" }}>
              <div>
                <p className={`text-sm font-medium ${darkMode ? "dm-text" : "text-gray-700"}`}>{item.label}</p>
                <p style={{ fontSize: 10 }} className={`mt-1 ${darkMode ? "dm-subtext" : ""}`} {...(!darkMode && { style: { fontSize: 10, color: "#9ca3af" } })}>{item.desc}</p>
              </div>
              <Toggle value={settings[item.key]} onChange={(v) => update(item.key, v)} label={item.label} />
            </div>
          ))}
        </div>

        <div className={`rounded-2xl p-4 mb-3 ${darkMode ? "dm-card" : "bg-white"}`} style={{ boxShadow: "0 2px 16px rgba(0,0,0,0.06)" }}>
          <div className="flex items-center gap-2 mb-3">
            <Bell size={16} color={TEAL} />
            <span className={`text-xs font-bold ${darkMode ? "dm-text" : "text-gray-700"}`}>Настройки</span>
          </div>
          {[
            { label: "Уведомления", desc: "Push-уведомления о маршрутах", key: "notifications" },
            { label: "Тёмная тема", desc: "Сберегите заряд батареи", key: "darkMode" },
          ].map((item, i) => (
            <div key={i} className="flex items-center justify-between py-2" style={{ borderBottom: i < 1 ? `1px solid ${darkMode ? "#475569" : "#f1f5f9"}` : "none" }}>
              <div>
                <p className={`text-sm font-medium ${darkMode ? "dm-text" : "text-gray-700"}`}>{item.label}</p>
                <p style={{ fontSize: 10 }} className={`mt-1 ${darkMode ? "dm-subtext" : ""}`} {...(!darkMode && { style: { fontSize: 10, color: "#9ca3af" } })}>{item.desc}</p>
              </div>
              <Toggle value={settings[item.key]} onChange={(v) => update(item.key, v)} label={item.label} />
            </div>
          ))}
        </div>

        <div className="relative overflow-hidden rounded-2xl p-4 mb-4" style={{ background: `linear-gradient(135deg, ${GOLD}15, ${SAND})` }}>
          <div className="flex items-center gap-2 mb-2">
            <CreditCard size={16} color={GOLD} />
            <span className="text-xs font-bold text-gray-700">Подписка Premium</span>
          </div>
          <p style={{ fontSize: 11, color: "#6b7280" }} className="mb-3">AI-рекомендации, эксклюзивные маршруты, без рекламы</p>
          <div className="flex items-end gap-1 mb-3">
            <span className="text-2xl font-bold text-gray-800">1 990 ₸</span>
            <span className="text-xs mb-1" style={{ color: "#9ca3af" }}>/ месяц</span>
          </div>
          <div className="mb-3" style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {["AI-маршруты без ограничений", "Офлайн-карты всех регионов", "Эксклюзивные скрытые места"].map((f, i) => (
              <div key={i} className="flex items-center gap-2">
                <Check size={12} color={GOLD} />
                <span style={{ fontSize: 11, color: "#4b5563" }}>{f}</span>
              </div>
            ))}
          </div>
          <button className="w-full py-2 rounded-xl text-white text-xs font-bold" style={{ background: `linear-gradient(135deg, ${GOLD}, #b8860b)`, boxShadow: `0 3px 12px ${GOLD}40` }}>
            Активировано ✓
          </button>
        </div>
        <div style={{ height: 16 }} />
      </div>
    </div>
  );
};

/* =================== MAIN APP =================== */
function SaparApp() {
  const [activeTab, setActiveTab] = useState(0);
  const [selectedLocation, setSelectedLocation] = useState(null);
  const [showPOI, setShowPOI] = useState(false);

  const [likedIds, setLikedIds] = useState(new Set());
  const [itineraryItems, setItineraryItems] = useState(defaultItinerary);
  const [offlineMode, setOfflineMode] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [activeFilter, setActiveFilter] = useState(null);
  const [profileSettings, setProfileSettings] = useState({
    lang: "РУС",
    geoEnabled: true,
    analyticsEnabled: false,
    darkMode: false,
    notifications: true,
  });

  const routeLocationIds = new Set(itineraryItems.filter(it => it.locId).map(it => it.locId));

  const toggleLike = (id) => {
    setLikedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const addToRoute = (loc) => {
    if (routeLocationIds.has(loc.id)) return;
    const lastItem = itineraryItems[itineraryItems.length - 1];
    const lastHour = lastItem ? parseInt(lastItem.time.split(":")[0]) + 1 : 9;
    const newTime = `${String(lastHour).padStart(2, "0")}:00`;
    const newItem = {
      id: Date.now(),
      locId: loc.id,
      time: newTime,
      title: loc.name,
      subtitle: loc.subtitle,
      duration: "2ч",
      icon: "added",
    };
    setItineraryItems(prev => [...prev, newItem]);
  };

  const removeFromRoute = (itemId) => {
    setItineraryItems(prev => prev.filter(it => it.id !== itemId));
  };

  const handleLocationTap = (loc) => { setSelectedLocation(loc); setShowPOI(true); };

  const tabs = [
    { icon: Compass, label: "Главная" },
    { icon: Map, label: "Маршрут" },
    { icon: Heart, label: "Избранное" },
    { icon: User, label: "Профиль" },
  ];

  const renderScreen = () => {
    if (showPOI && selectedLocation) {
      return (
        <POIScreen
          location={selectedLocation}
          onBack={() => setShowPOI(false)}
          isLiked={likedIds.has(selectedLocation.id)}
          onToggleLike={toggleLike}
          isInRoute={routeLocationIds.has(selectedLocation.id)}
          onAddToRoute={addToRoute}
        />
      );
    }
    switch (activeTab) {
      case 0: return (
        <DiscoveryScreen
          onLocationTap={handleLocationTap}
          onAIRoute={() => setActiveTab(1)}
          likedIds={likedIds}
          searchQuery={searchQuery}
          onSearchChange={setSearchQuery}
          activeFilter={activeFilter}
          onFilterChange={setActiveFilter}
        />
      );
      case 1: return (
        <ItineraryScreen
          items={itineraryItems}
          onItemsChange={setItineraryItems}
          offlineMode={offlineMode}
          onOfflineModeChange={setOfflineMode}
          onRemoveItem={removeFromRoute}
        />
      );
      case 2: return (
        <FavoritesScreen
          likedIds={likedIds}
          onLocationTap={handleLocationTap}
          onToggleLike={toggleLike}
        />
      );
      case 3: return <ProfileScreen settings={profileSettings} onSettingsChange={setProfileSettings} />;
      default: return null;
    }
  };

  return (
      <div className="relative overflow-hidden flex flex-col" style={{ width: 375, height: 812, borderRadius: 40, boxShadow: "0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05)", background: "#fff" }}>

          <div className="flex-1 overflow-hidden" style={{ paddingTop: 0 }}>
              {renderScreen()}
          </div>

          {!showPOI && (
              <nav className="flex items-center justify-around px-4" style={{ paddingBottom: 28, paddingTop: 8, background: "#fff", borderTop: "1px solid #f1f5f9" }} aria-label="Основная навигация">
                  {tabs.map((tab, i) => {
                      const Icon = tab.icon;
                      const active = activeTab === i;
                      const badge = i === 2 && likedIds.size > 0;
                      return (
                          <button key={i} onClick={() => setActiveTab(i)} className="flex flex-col items-center gap-1 py-1 px-3 relative" aria-label={tab.label} aria-current={active ? "page" : undefined}>
                              <div className="rounded-xl flex items-center justify-center transition-all relative" style={{ width: 32, height: 32, background: active ? `${TEAL}12` : "transparent", transform: active ? "scale(1.1)" : "scale(1)" }}>
                                  <Icon size={20} color={active ? TEAL : "#94a3b8"} fill={active && i === 2 ? TEAL : "none"} strokeWidth={active ? 2.5 : 1.8} />
                                  {badge && (
                                      <div className="absolute -top-0.5 -right-0.5 rounded-full flex items-center justify-center" style={{ width: 14, height: 14, background: "#f87171", fontSize: 8, color: "#fff", fontWeight: 700 }}>
                                          {likedIds.size}
                                      </div>
                                  )}
                              </div>
                              <span className="font-medium" style={{ fontSize: 10, color: active ? TEAL : "#94a3b8" }}>{tab.label}</span>
                          </button>
                      );
                  })}
              </nav>
          )}

          <div className="absolute rounded-full" style={{ bottom: 8, left: "50%", transform: "translateX(-50%)", width: 128, height: 4, background: "rgba(0,0,0,0.15)" }} />
      </div>
  )}
ReactDOM.createRoot(document.getElementById("root")).render(<SaparApp />);
</script>
</body>
</html>
